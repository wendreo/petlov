name: Cypress e2e Tests
on:
  #push:[]
  workflow_dispatch: # Allows manual trigger of workflow from GitHub UI
    inputs:
      spec:
        default: cypress/e2e/*

jobs:
  chrome tests:
    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:26.0.0
      options: --user 1001
    # Runs tests in parallel with matrix strategy https://on.cypress.io/parallelization
    # https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/run-job-variations
    # Also see warning here https://github.com/cypress-io/github-action#parallel
    strategy:
      fail-fast: false # https://github.com/cypress-io/github-action/issues/48
      matrix:
        containers: [1, 2] # Uses 2 parallel instances
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cypress run e2e tests
        # Uses the official Cypress GitHub action https://github.com/cypress-io/github-action
        uses: cypress-io/github-action@v7
        with:
          # Starts web server for E2E tests - replace with your own server invocation
          # https://docs.cypress.io/app/continuous-integration/overview#Boot-your-server
          #start: npm start # Starts server - replace with your own if needed
          install-command: npm install # Installs dependencies - replace with your own if needed
          wait-on: "https://petlov.vercel.app" # Waits for above
          browser: chrome # Runs tests in Chrome - replace with your own if needed
          group: chrome # Groups recorded tests in Cypress Cloud - replace with your own if needed
          # Records to Cypress Cloud
          # https://docs.cypress.io/cloud/get-started/setup
          record: true
          parallel: true # Runs test in parallel using settings above
          spec: ${{ github.event.inputs.spec }} # Allows passing specific spec file(s) to run - replace with your own if needed
        env:
          # For recording and parallelization you must set your CYPRESS_RECORD_KEY
          # in GitHub repo → Settings → Secrets → Actions
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          # Create a token https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/creating-a-personal-access-token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
  firefox tests:
    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:26.0.0
      options: --user 1001
    # Runs tests in parallel with matrix strategy https://on.cypress.io/parallelization
    # https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/run-job-variations
    # Also see warning here https://github.com/cypress-io/github-action#parallel
    strategy:
      fail-fast: false # https://github.com/cypress-io/github-action/issues/48
      matrix:
        containers: [1, 2] # Uses 2 parallel instances
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cypress run e2e tests
        # Uses the official Cypress GitHub action https://github.com/cypress-io/github-action
        uses: cypress-io/github-action@v7
        with:
          # Starts web server for E2E tests - replace with your own server invocation
          # https://docs.cypress.io/app/continuous-integration/overview#Boot-your-server
          #start: npm start # Starts server - replace with your own if needed
          install-command: npm install # Installs dependencies - replace with your own if needed
          wait-on: "https://petlov.vercel.app" # Waits for above
          browser: firefox # Runs tests in Firefox - replace with your own if needed
          group: Firefox # Groups tests in Cypress Cloud - replace with your own if needed
          # Records to Cypress Cloud
          # https://docs.cypress.io/cloud/get-started/setup
          record: true
          parallel: true # Runs test in parallel using settings above
          spec:  ${{ github.event.inputs.spec }} # Allows passing specific spec file(s) to run - replace with your own if needed
        env:
          # For recording and parallelization you must set your CYPRESS_RECORD_KEY
          # in GitHub repo → Settings → Secrets → Actions
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          # Create a token https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/creating-a-personal-access-token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}